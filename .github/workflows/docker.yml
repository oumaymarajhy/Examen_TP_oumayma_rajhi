name: Build and Push Docker Images

on:
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build backend image
        run: docker build -t yourdockerhubusername/backend:latest ./backend

      - name: Build frontend image
        run: docker build -t yourdockerhubusername/frontend:latest ./frontend

      - name: Push backend image
        run: docker push yourdockerhubusername/backend:latest

      - name: Push frontend image
        run: docker push yourdockerhubusername/frontend:latest